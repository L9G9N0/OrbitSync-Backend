services:
  - type: web
    name: blackhole-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STORAGE_PROVIDER
        value: minio
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        sync: false
      - key: MINIO_SECURE
        value: "false"
      - key: MINIO_PUBLIC_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
