services:
  # 🌌 MinIO Object Storage Engine
  minio:
    image: minio/minio:latest
    container_name: blackhole-minio
    ports:
      - "9000:9000" # MinIO API
      - "9001:9001" # MinIO Console Browser
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blackhole-network

  # ⚙️ Auto-Initializer Bucket Creator
  mc-init:
    image: minio/mc:latest
    container_name: blackhole-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set localminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing localminio/blackhole;
      mc anonymous set download localminio/blackhole;
      exit 0;
      "
    networks:
      - blackhole-network

  # 🚀 FastAPI Backend API Gateway
  web:
    build: .
    container_name: blackhole-backend
    ports:
      - "8000:8000"
    environment:
      - STORAGE_PROVIDER=minio
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=blackhole
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=http://localhost:9000 # remap host for browser direct presigned URLs
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
      - local_data:/app/local_vault_storage
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - blackhole-network

volumes:
  minio_data:
  local_data:

networks:
  blackhole-network:
    name: blackhole-network
